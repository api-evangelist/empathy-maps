aid: empathy-maps
name: Empathy Maps
description: >-
  An empathy map is a collaborative visualization tool used to articulate what
  is known about a particular type of user. It externalizes knowledge about users
  in order to create a shared understanding of user needs, and aids in decision
  making. Empathy maps are used in design thinking and UX design to build
  empathy with target users.
